<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pandu Ka Sach!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background-color: #000;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            touch-action: none; 
        }
        .card {
            background: white;
            padding: 2rem 1.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.4);
            text-align: center;
            width: 85%;
            max-width: 400px;
            border: 4px solid #3b82f6;
            z-index: 10;
        }
        #no-btn {
            transition: all 0.2s ease-out;
            z-index: 50;
            white-space: nowrap;
        }
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 60px;
            background: #3b82f6;
            border-radius: 50%;
            animation: floatUp 4s ease-in forwards;
        }
        @keyframes floatUp {
            to { transform: translateY(-120vh) rotate(20deg); }
        }
        .hidden { display: none; }
        .success-text {
            color: #1e40af;
            font-size: 2rem;
            font-weight: 900;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        #timer-display {
            font-size: 0.8rem;
            color: #3b82f6;
            margin-top: 1.5rem;
            font-weight: bold;
            background: #dbeafe;
            padding: 4px 12px;
            border-radius: 15px;
            display: inline-block;
        }
        .disabled-btn {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="question-section">
        <h1 class="text-lg md:text-xl font-bold text-blue-800 mb-6 leading-tight">
            Main <span class="text-pink-500 font-extrabold">Desigamergirl (Pandu)</span> 
            bolta hun ki <span class="text-blue-600 underline">Zombie</span> 
            mera BFF hain 😎
        </h1>

        <div class="flex flex-row justify-center items-center gap-4 mt-8 h-16 relative">
            <button id="yes-btn" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-full shadow-lg disabled-btn">YES</button>
            <button id="no-btn" class="bg-red-500 text-white font-bold py-3 px-8 rounded-full shadow-lg disabled-btn">NO</button>
        </div>

        <p id="timer-display">Pura padh lo... (10s)</p>
    </div>

    <div id="success-section" class="hidden">
        <div class="text-5xl mb-2">🥳🎉</div>
        <h2 class="success-text">HAPPY BIRTHDAY DG!</h2>
        <p class="text-blue-600 mt-2 font-bold">Zombie hi BFF hai 😎</p>
    </div>
</div>

<script>
const noBtn = document.getElementById('no-btn');
const yesBtn = document.getElementById('yes-btn');
const timerDisplay = document.getElementById('timer-display');
const questionSection = document.getElementById('question-section');
const successSection = document.getElementById('success-section');

let noCount = 0;
let lastX = 0, lastY = 0;
let canInteract = false;

const messages = ["Nahi! 😭", "Pandu ruk! 😂", "Missed it!", "Try harder 😏", "Zombie BFF! ❤️", "Pakad lo! 😈"];

// ⏱ TIMER LOGIC
let time = 10;
const timer = setInterval(() => {
    time--;
    if (time > 0) {
        timerDisplay.innerText = `Pura padh lo... (${time}s)`;
    } else {
        clearInterval(timer);
        timerDisplay.innerText = "Ab choose karo 😉";
        canInteract = true;
        noBtn.classList.remove('disabled-btn');
        yesBtn.classList.remove('disabled-btn');
    }
}, 1000);

// TRACKING COORDS
const updateCoords = (e) => {
    lastX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
    lastY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
};
document.addEventListener('mousemove', updateCoords);
document.addEventListener('touchstart', updateCoords);

// MOVE LOGIC
function moveButton(e) {
    if (!canInteract) return;
    if (e.type === 'touchstart') e.preventDefault();

    let x, y, dist;
    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    do {
        x = Math.random() * (window.innerWidth - btnWidth - 40) + 20;
        y = Math.random() * (window.innerHeight - btnHeight - 40) + 20;
        dist = Math.hypot(x - lastX, y - lastY);
    } while (dist < 150);

    noBtn.style.position = 'fixed';
    noBtn.style.left = `${x}px`;
    noBtn.style.top = `${y}px`;

    noBtn.innerText = messages[noCount % messages.length];
    noCount++;
}

noBtn.addEventListener('mouseover', moveButton);
noBtn.addEventListener('touchstart', moveButton, {passive: false});

// SUCCESS LOGIC
yesBtn.addEventListener('click', () => {
    if (!canInteract) return;
    questionSection.classList.add('hidden');
    successSection.classList.remove('hidden');
    noBtn.style.display = 'none';

    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

    for (let i = 0; i < 25; i++) {
        setTimeout(() => {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.style.left = Math.random() * 90 + 'vw';
            b.style.backgroundColor = i % 2 === 0 ? '#3b82f6' : '#60a5fa';
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 4000);
        }, i * 150);
    }
});
</script>
</body>
</html>
